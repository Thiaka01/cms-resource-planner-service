spring:
  datasource:
    url: jdbc:h2:mem:planner_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost/realms/test

eureka:
  client:
    enabled: false

cms:
  planner:
    outbox:
      poll-interval-ms: 60000
      batch-size: 10
    working-day-minutes: 480
    geoapify:
      api-key: ""
      base-url: https://api.geoapify.com
      neighbor-top-n: 10
      neighbor-job-cron: "0 0 0 * * *"
