spring:
  application:
    name: cms-resource-planner
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5441/cms_resource_planner_db}
    username: ${SPRING_DATASOURCE_USERNAME:chemical}
    password: ${SPRING_DATASOURCE_PASSWORD:chemical}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: cms-resource-planner
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8080/realms/chemical-platform}

server:
  port: ${SERVER_PORT:8101}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

cms:
  openapi:
    gateway-url: ${CMS_OPENAPI_GATEWAY_URL:http://localhost:8088}
  planner:
    outbox:
      poll-interval-ms: 5000
      batch-size: 50
    working-day-minutes: 480
    geoapify:
      api-key: ${GEOAPIFY_API_KEY:}
      base-url: https://api.geoapify.com
      neighbor-top-n: 10
      neighbor-job-cron: "0 */30 * * * *"

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: false

logging:
  level:
    com.nuvemite.cms.planner: INFO
